<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dastan Shop</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dastan Shop">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* Изменен фон на глубокий темный оттенок */
body{font-family:'Nunito',sans-serif;background:#121214;color:#e1e1e6;min-height:100vh;overscroll-behavior:none}

/* BANNERS */
#install-banner{display:none;background:linear-gradient(135deg,#1a1a2e,#16213e);padding:11px 16px;border-bottom:1px solid rgba(232,197,71,.2)}
.install-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px}
.install-text{flex:1;color:#fff;font-size:13px;font-weight:700}
.install-text span{color:#e8c547}
.install-yes{padding:7px 14px;border-radius:10px;border:none;background:#e8c547;color:#1a1a2e;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.install-no{padding:7px 8px;border-radius:10px;border:none;background:transparent;color:#666;font-size:18px;cursor:pointer}

#push-ask{display:none;background:#16213e;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.push-ask-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px}
.push-text{flex:1;color:#fff;font-size:13px;font-weight:700}
.push-text span{color:#e8c547}
.push-yes{padding:7px 14px;border-radius:10px;border:none;background:#e8c547;color:#1a1a2e;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.push-no{padding:7px 10px;border-radius:10px;border:none;background:transparent;color:#888;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

#delivery-banner{display:none;background:linear-gradient(135deg,#1a6e3c,#2d9e6e);padding:12px 16px;cursor:pointer}
.banner-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px}
.banner-text{flex:1}
.banner-title{color:#fff;font-size:14px;font-weight:900}
.banner-sub{color:rgba(255,255,255,.8);font-size:12px;font-weight:600}
.banner-close{color:rgba(255,255,255,.6);font-size:18px;padding:4px;cursor:pointer;flex-shrink:0}

/* HEADER */
.header{background:#1a1a2e;padding:12px 14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px}
.back-btn{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,.2)}
.header-titles{flex:0 0 auto;max-width:140px}
.header-sub{color:#e8c547;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
.header-main{color:#fff;font-size:16px;font-weight:900;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-box{flex:1;padding:9px 13px;border-radius:12px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:14px;font-family:'Nunito',sans-serif;outline:none;min-width:0}
.search-box::placeholder{color:rgba(255,255,255,.4)}
.header-btns{display:flex;gap:8px;flex-shrink:0}
.add-btn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,#e8c547,#f0a500);color:#1a1a2e;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(232,197,71,.4);transition:transform .15s;flex-shrink:0}
.add-btn:active{transform:scale(.9)}
.delivery-btn{width:42px;height:42px;border-radius:12px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.delivery-badge{position:absolute;top:-4px;right:-4px;background:#e8544a;color:#fff;font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}
.cam-search-btn{width:42px;height:42px;border-radius:12px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.cam-search-btn:active{background:rgba(255,255,255,.2)}

/* BREADCRUMB */
#breadcrumb{display:none;background:#202024;border-bottom:1px solid #29292e;padding:8px 16px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#breadcrumb::-webkit-scrollbar{display:none}
.breadcrumb-inner{max-width:960px;margin:0 auto;display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700}
.bc-item{color:#888;cursor:pointer;padding:2px 4px;border-radius:6px}
.bc-item:hover{color:#fff}
.bc-sep{color:#444}
.bc-current{color:#fff}

/* HOME SEARCH */
.home-search-wrap{padding:14px 12px 0;max-width:960px;margin:0 auto}
.home-search{width:100%;padding:11px 16px;border-radius:14px;border:2px solid #29292e;background:#202024;color:#fff;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border .15s}
.home-search:focus{border-color:#e8c547}

/* SEARCH RESULTS */
#search-results{display:none;max-width:960px;margin:0 auto;padding:10px 12px 90px}
.search-section-title{font-size:11px;font-weight:900;color:#999;text-transform:uppercase;letter-spacing:2px;margin:12px 0 8px}
.search-cat-item{background:#202024;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.search-cat-item:active{background:#29292e}
.search-cat-img{width:44px;height:44px;border-radius:10px;background:#121214;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;flex-shrink:0}
.search-cat-img img{width:100%;height:100%;object-fit:cover}
.search-cat-name{font-size:15px;font-weight:800;color:#fff}
.search-cat-count{font-size:12px;color:#999;font-weight:600}
.search-prod-item{background:#202024;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.search-prod-img{width:44px;height:44px;border-radius:10px;background:#121214;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.search-prod-img img{width:100%;height:100%;object-fit:cover}
.search-prod-name{font-size:14px;font-weight:800;color:#fff}
.search-prod-info{font-size:12px;color:#999;font-weight:600}
.search-prod-price{font-size:16px;font-weight:900;color:#00b37e;margin-left:auto;flex-shrink:0}

/* CATEGORIES HOME */
#categories-home{display:block}
.cats-home-wrap{max-width:960px;margin:0 auto;padding:12px 12px 90px}
.cats-home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.cat-home-card{background:#202024;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.2);transition:transform .18s;position:relative;display:flex;flex-direction:column}
.cat-home-card:active{transform:scale(.96)}
.cat-card-img{height:110px;background:linear-gradient(135deg,#29292e,#121214);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cat-card-img img{width:100%;height:100%;object-fit:cover}
.cat-card-emoji{font-size:48px}
.cat-card-body{padding:10px 12px 12px;flex:1}
.cat-card-name{font-size:14px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:2px}
.cat-card-count{font-size:11px;color:#999;font-weight:600}
.cat-card-edit{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.9);border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);color:#1a1a2e}
.cat-home-card.all-card .cat-card-img{background:linear-gradient(135deg,#1a1a2e,#2d2d4a)}
.cat-home-card.add-cat-card{border:2px dashed #444;box-shadow:none;background:transparent}
.cat-home-card.add-cat-card .cat-card-img{background:transparent}

/* PRODUCTS VIEW */
#products-view{display:none}
.grid-wrap{max-width:960px;margin:0 auto;padding:14px 12px 90px}

/* 🔥 ОБНОВЛЕННЫЙ РАЗМЕР КАРТОЧЕК И АДАПТИВНАЯ СЕТКА */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

.card{background:#202024;border-radius:16px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.3);cursor:pointer;transition:transform .18s;display:flex;flex-direction:column;min-height:420px;border:1px solid #29292e}
.card:active{transform:scale(.97)}

/* Зафиксированная область изображения */
.card-img{height:220px;background:linear-gradient(135deg,#29292e,#121214);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-emoji{font-size:50px}

.card-body{padding:14px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.card-name{font-weight:800;font-size:15px;color:#fff;margin-bottom:4px;line-height:1.3}
.card-weight{color:#999;font-size:12px;margin-bottom:8px}

/* Новый стиль для вкуса товара */
.card-flavor-badge{align-self:flex-start;background:#29292e;color:#ffb86c;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:12px}

.card-price{font-size:20px;font-weight:900;color:#00b37e;margin-top:auto}
.card-variants{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.card-variant-chip{font-size:9px;font-weight:800;color:#8a8a8a;background:#f5f0e8;border-radius:6px;padding:2px 6px}

/* SUBCATEGORY STRIP */
.subcat-strip{background:#202024;border-bottom:1px solid #29292e;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.subcat-strip::-webkit-scrollbar{display:none}
.subcat-strip-inner{display:flex;padding:8px 12px;gap:8px;max-width:960px;margin:0 auto}
.subcat-chip{padding:7px 14px;border-radius:20px;border:2px solid #29292e;background:#121214;font-size:13px;font-weight:800;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.subcat-chip.active{background:#e8c547;border-color:#e8c547;color:#1a1a2e}
.subcat-chip.add-subcat{border-style:dashed;color:#555}

/* DELIVERIES */
#deliveries-view{display:none;max-width:960px;margin:0 auto;padding:14px 12px 90px}
.section-title{font-size:12px;font-weight:900;color:#999;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;margin-top:4px}
.delivery-card{background:#202024;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 3px 14px rgba(0,0,0,.2);display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid #29292e}
.delivery-card.today{border-left:4px solid #2d9e6e;background:linear-gradient(135deg,#163324,#202024)}
.delivery-card.upcoming{border-left:4px solid #e8c547}
.delivery-card.past{border-left:4px solid #444;opacity:.5}
.del-info{flex:1}
.del-company{font-size:15px;font-weight:900;color:#fff}
.del-date{font-size:12px;color:#999;font-weight:600;margin-top:1px}
.del-amount{font-size:17px;font-weight:900;color:#00b37e;flex-shrink:0}
.del-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px;margin-top:3px;display:inline-block}
.del-badge.today{background:#163324;color:#2d9e6e}
.del-badge.upcoming{background:#3a321d;color:#e8c547}
.del-badge.past{background:#29292e;color:#888}
.add-delivery-btn{width:100%;padding:14px;border-radius:14px;border:2px dashed #444;background:transparent;color:#888;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}

/* EMPTY */
.empty{text-align:center;color:#666;font-size:15px;padding-top:50px}
.empty-icon{font-size:48px;margin-bottom:10px}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e8c547;font-size:12px;font-weight:600;padding:7px 18px;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;z-index:40}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#202024;color:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:18px 18px 30px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:19px;font-weight:900;color:#fff;margin-bottom:16px}
.img-upload-row-big{margin-bottom:16px}
.img-preview-big{width:100%;height:190px;border-radius:16px;background:#121214;border:2px dashed #444;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;font-size:60px}
.img-preview-big img{width:100%;height:100%;object-fit:cover}
.img-overlay-big{position:absolute;left:0;right:0;bottom:0;padding:9px;background:rgba(26,26,46,.85);color:#fff;font-size:13px;font-weight:800;text-align:center}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px}
.emoji-opt{width:32px;height:32px;border-radius:8px;border:2px solid #29292e;background:#121214;font-size:16px;cursor:pointer;transition:border .15s;display:flex;align-items:center;justify-content:center}
.emoji-opt.active{border-color:#e8c547;background:#3a321d}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:11px;border:2px solid #29292e;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border .15s;background:#121214;color:#fff}
.field input:focus,.field select:focus{border-color:#e8c547}
.unit-chip-row{display:flex;gap:6px;margin-top:6px}
.unit-chip{flex:1;padding:7px 0;border-radius:9px;border:2px solid #29292e;background:#121214;color:#888;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:center}
.unit-chip:active{background:#3a321d;border-color:#e8c547;color:#fff}
.price-label{font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:5px}
.price-row{display:flex;align-items:center;gap:7px;margin-bottom:18px}
.price-input{flex:1;padding:12px 8px;border-radius:11px;border:2px solid #29292e;background:#121214;color:#fff;font-size:22px;font-family:'Nunito',sans-serif;font-weight:900;text-align:center;outline:none;transition:border .15s}
.price-input:focus{border-color:#e8c547}
.upload-status{text-align:center;color:#888;font-size:13px;font-weight:700;margin-bottom:12px;display:none}
.progress-bar{height:4px;background:#29292e;border-radius:2px;margin-bottom:14px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#e8c547,#f0a500);width:0%;transition:width .3s}
.save-btn{width:100%;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,#e8c547,#f0a500);color:#1a1a2e;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 16px rgba(232,197,71,.4)}
.save-btn:disabled{background:#444;color:#888;box-shadow:none;cursor:default}
.delete-btn{width:100%;padding:11px;border-radius:13px;border:2px solid #411;background:#202024;color:#e8544a;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:10px}
.notify-btn{width:100%;padding:11px;border-radius:13px;border:2px solid #163324;background:#163324;color:#2d9e6e;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:10px}
.photo-upload-label{display:block;width:100%;padding:11px;border-radius:13px;border:2px solid #e8c547;background:#3a321d;color:#e8c547;font-size:14px;font-weight:800;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;margin-bottom:10px}

/* TOAST */
.toast{display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e8c547;padding:9px 20px;border-radius:12px;font-size:13px;font-weight:800;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:200;white-space:nowrap}
.toast.show{display:block;animation:fadeT .2s}
@keyframes fadeT{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}
.loading{text-align:center;color:#666;padding:50px 20px;font-size:14px}
.spinner{width:30px;height:30px;border:3px solid #e8c547;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== CAMERA SEARCH MODAL И ИСПРАВЛЕНИЕ ОШИБКИ СТИЛЕЙ ===================== */
#cam-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:150;align-items:flex-end;justify-content:center}
#cam-modal.open{display:flex}
.cam-sheet{background:#202024;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:0 0 30px;max-height:95vh;overflow-y:auto;animation:slideUp .25s ease;display:flex;flex-direction:column}

#cam-live-wrap{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
#cam-live-wrap.open{display:flex}
#cam-video{width:100%;flex:1;object-fit:cover}
.cam-viewfinder{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:260px;height:260px;border:3px solid rgba(232,197,71,.85);border-radius:20px;box-shadow:0 0 0 2000px rgba(0,0,0,.45);pointer-events:none}
.cam-hint{position:absolute;top:50%;left:50%;transform:translate(-50%, 80px);color:rgba(255,255,255,.75);font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;text-align:center;pointer-events:none}
.cam-controls{position:absolute;bottom:0;left:0;right:0;padding:28px 32px 40px;display:flex;align-items:center;justify-content:center;gap:24px}
.cam-close-btn{width:52px;height:52px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:22px;cursor:pointer}
.cam-shoot-btn{width:72px;height:72px;border-radius:50%;border:4px solid rgba(255,255,255,.5);background:#e8c547;color:#1a1a2e;font-size:26px;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center}
.cam-shoot-btn:active{transform:scale(.92)}
.cam-gallery-btn{width:52px;height:52px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:22px;cursor:pointer}

.cam-idle{padding:28px 20px 10px;text-align:center}
.cam-idle-icon{font-size:64px;margin-bottom:12px}
.cam-idle-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:6px}
.cam-idle-sub{font-size:14px;color:#999;font-weight:600;margin-bottom:28px;line-height:1.5}
.cam-open-btn{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#e8c547,#f0a500);color:#1a1a2e;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:10px;box-shadow:0 5px 18px rgba(232,197,71,.4)}
.cam-gallery-open-btn{width:100%;padding:13px;border-radius:16px;border:2px solid #29292e;background:transparent;color:#888;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

.cam-preview-wrap{padding:0}
.cam-preview-img{width:100%;max-height:300px;object-fit:cover;border-radius:24px 24px 0 0}
.cam-preview-actions{padding:16px 18px 0;display:flex;gap:10px}
.cam-analyze-btn{flex:1;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#e8c547,#f0a500);color:#1a1a2e;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px rgba(232,197,71,.35)}
.cam-retake-btn{padding:14px 16px;border-radius:14px;border:2px solid #29292e;background:transparent;color:#888;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

.cam-analyzing{padding:40px 20px;text-align:center}
.cam-spin{width:52px;height:52px;border:4px solid #e8c547;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin:20px auto 14px}
.cam-analyzing-title{font-size:16px;font-weight:800;color:#fff}
</style>
</head>
<body>

    <!-- ВЕРХНИЕ БАННЕРЫ -->
    <div id="install-banner">
        <div class="install-inner">
            <div class="install-text">Установите приложение <span>Dastan Shop</span> на экран телефона</div>
            <button class="install-yes" id="btn-install-pwa">Скачать</button>
            <button class="install-no" id="btn-close-install">✕</button>
        </div>
    </div>

    <!-- ШАПКА -->
    <div class="header">
        <div class="header-inner">
            <button class="back-btn" id="header-back-btn">←</button>
            <div class="header-titles">
                <div class="header-sub">Магазин</div>
                <div class="header-main">Dastan Shop</div>
            </div>
            <input type="text" class="search-box" id="global-search" placeholder="Поиск товаров...">
            <div class="header-btns">
                <button class="cam-search-btn" id="open-cam-btn">📷</button>
                <button class="add-btn" id="admin-add-btn">+</button>
                <button class="delivery-btn" id="view-deliv-btn">🚚<div class="delivery-badge" id="deliv-badge">0</div></button>
            </div>
        </div>
    </div>

    <!-- КАТЕГОРИИ НА ГЛАВНОЙ -->
    <div id="categories-home">
        <div class="cats-home-wrap">
            <div class="section-title">Категории товаров</div>
            <div class="cats-home-grid" id="cats-home-grid-container">
                <!-- Пример одной из увеличенных карточек с поддержкой вывода нового поля вкуса -->
                <div class="card">
                    <div class="card-img">
                        <span class="card-emoji">🍓</span>
                    </div>
                    <div class="card-body">
                        <div>
                            <div class="card-name">Демо-товар</div>
                            <div class="card-flavor-badge">Характеристика / Вкус</div>
                            <div class="card-weight">1 шт / 500г</div>
                        </div>
                        <div class="card-price">1 500 ₸</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ТОВАРЫ ВНУТРИ КАТЕГОРИИ -->
    <div id="products-view">
        <div class="subcat-strip">
            <div class="subcat-strip-inner" id="subcats-strip-container"></div>
        </div>
        <div class="grid-wrap">
            <div class="product-grid" id="products-grid-container"></div>
        </div>
    </div>

    <!-- АДМИН-ПАНЕЛЬ (МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ) -->
    <div class="modal-overlay" id="add-product-modal">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">Добавить новый товар</div>
            
            <form id="firebase-add-form">
                <!-- 🔥 КЛЮЧИ ДОСТУПА API (2 ШТ) -->
                <div class="field">
                    <label>Firebase API Key (Основной)</label>
                    <input type="password" id="api-key-main" placeholder="AIzaSy..." required>
                </div>
                <div class="field">
                    <label>Storage API Key (Для картинок)</label>
                    <input type="password" id="api-key-storage" placeholder="AIzaSy..." required>
                </div>

                <div class="field">
                    <label>Название товара</label>
                    <input type="text" id="add-name" placeholder="Например: Гранатовый сок" required>
                </div>

                <!-- 🔥 НОВАЯ ФУНКЦИЯ: ДОБАВЛЕНИЕ ВКУСА -->
                <div class="field">
                    <label>Вкус / Особенность товара</label>
                    <input type="text" id="add-flavor" placeholder="Например: Сладкий, Кислый, Клубника" required>
                </div>

                <div class="field">
                    <label>Объем / Вес</label>
                    <input type="text" id="add-weight" placeholder="Например: 500 мл или 1 кг" required>
                </div>

                <div class="price-label">Цена товара (₸)</div>
                <div class="price-row">
                    <input type="number" class="price-input" id="add-price" placeholder="0" required>
                </div>

                <div class="img-upload-row-big">
                    <div class="img-preview-big" id="img-preview-zone">
                        <span>🖼️</span>
                        <div class="img-overlay-big">Нажмите, чтобы загрузить фото</div>
                    </div>
                    <input type="file" id="file-hidden-input" accept="image/*" style="display:none">
                </div>

                <button type="submit" class="save-btn" id="btn-save-product">Загрузить в Firebase</button>
            </form>
        </div>
    </div>

    <!-- ТЕКСТОВЫЕ УВЕДОМЛЕНИЯ -->
    <div class="toast" id="toast-msg">Товар добавлен!</div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-bar">dastanshop © 2026</div>

    <script>
        // Элементы управления модальным окном
        const addBtn = document.getElementById('admin-add-btn');
        const modal = document.getElementById('add-product-modal');
        const previewZone = document.getElementById('img-preview-zone');
        const hiddenInput = document.getElementById('file-hidden-input');

        addBtn.addEventListener('click', () => modal.classList.add('open'));
        modal.addEventListener('click', (e) => {
            if(e.target === modal) modal.classList.remove('open');
        });

        previewZone.addEventListener('click', () => hiddenInput.click());
        hiddenInput.addEventListener('change', function() {
            if(this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewZone.innerHTML = `<img src="${e.target.result}">`;
                }
                reader.readAsDataURL(this.files[0]);
            }
        });
    </script>
</body>
</html>
